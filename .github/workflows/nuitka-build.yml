name: Nuitka Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install Nuitka and build tools
        run: |
          uv pip install nuitka zstandard

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg || true

      - name: Compile with Nuitka
        run: |
          uv run python -m nuitka \
            --standalone \
            --onefile \
            --output-dir=dist \
            --output-filename=${{ github.event.repository.name }} \
            --include-package=arcade \
            --enable-plugin=pyside6 \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/${{ github.event.repository.name }}*
          retention-days: 30
