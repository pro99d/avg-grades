services:
  avg-grades:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir uv &&
      uv sync --frozen --no-dev &&
      uv run flet run --web --host '*' --port 80"
    ports:
      - "80:80"
    restart: unless-stopped
